<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Multi-Device Flappy Bird</title>
    <style>
        body { 
            margin: 0; 
            background: #222; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: manipulation; /* Prevents zooming on fast taps */
        }
        canvas { 
            background: #70c5ce; 
            max-width: 100%; 
            max-height: 100vh; 
            display: block;
        }
        #ui { 
            position: absolute; 
            text-align: center; 
            color: white; 
            text-shadow: 2px 2px #000; 
            pointer-events: none; 
            user-select: none;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="msg">FLAPPY BIRD</h1>
        <p id="submsg">Tap Screen or Press Space</p>
        <h2 id="scoreDisp" class="hidden">0</h2>
    </div>

    <canvas id="gameCanvas" width="360" height="580"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const msg = document.getElementById("msg");
    const submsg = document.getElementById("submsg");
    const scoreDisp = document.getElementById("scoreDisp");

    // Physics
    const gravity = 0.25;
    const flapSpeed = -5.5;
    const pipeWidth = 60;
    const pipeGap = 150;
    let pipeSpeed = 2.5;

    // State
    let bird = { x: 50, y: 250, w: 30, h: 25, vel: 0 };
    let pipes = [];
    let score = 0;
    let frame = 0;
    let gameState = "START"; 

    function resetGame() {
        bird.y = 250;
        bird.vel = 0;
        pipes = [];
        score = 0;
        frame = 0;
        gameState = "PLAYING";
        msg.classList.add("hidden");
        submsg.classList.add("hidden");
        scoreDisp.classList.remove("hidden");
        scoreDisp.innerText = "0";
    }

    function flap() {
        if (gameState === "START" || gameState === "GAMEOVER") {
            resetGame();
        } else {
            bird.vel = flapSpeed;
        }
    }

    // --- MULTI-DEVICE INPUTS ---
    // 1. Laptop: Keyboard
    window.addEventListener("keydown", (e) => { if (e.code === "Space") flap(); });
    // 2. Mobile/Laptop: Touch/Click
    window.addEventListener("touchstart", (e) => { e.preventDefault(); flap(); }, {passive: false});
    window.addEventListener("mousedown", (e) => { if(e.button === 0) flap(); });

    function update() {
        if (gameState === "PLAYING") {
            bird.vel += gravity;
            bird.y += bird.vel;

            // Boundary Check
            if (bird.y < 0 || bird.y + bird.h > canvas.height) endGame();

            // Pipe Spawn
            if (frame % 100 === 0) {
                let pipeY = Math.random() * (canvas.height - pipeGap - 100) + 50;
                pipes.push({ x: canvas.width, topH: pipeY, passed: false });
            }

            pipes.forEach(p => {
                p.x -= pipeSpeed;
                // Collision
                if (bird.x < p.x + pipeWidth && bird.x + bird.w > p.x &&
                   (bird.y < p.topH || bird.y + bird.h > p.topH + pipeGap)) {
                    endGame();
                }
                // Score
                if (p.x + pipeWidth < bird.x && !p.passed) {
                    score++;
                    p.passed = true;
                    scoreDisp.innerText = score;
                }
            });

            pipes = pipes.filter(p => p.x > -pipeWidth);
            frame++;
        }

        // 3. Joystick Support
        const gp = navigator.getGamepads()[0];
        if (gp && gp.buttons.some(b => b.pressed)) flap();
    }

    function endGame() {
        gameState = "GAMEOVER";
        msg.innerText = "GAME OVER";
        submsg.innerText = "Tap to Replay";
        msg.classList.remove("hidden");
        submsg.classList.remove("hidden");
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Pipes
        ctx.fillStyle = "#2ecc71";
        pipes.forEach(p => {
            ctx.fillRect(p.x, 0, pipeWidth, p.topH); 
            ctx.fillRect(p.x, p.topH + pipeGap, pipeWidth, canvas.height); 
        });

        // Draw Bird
        ctx.fillStyle = "#f1c40f";
        ctx.fillRect(bird.x, bird.y, bird.w, bird.h);

        update();
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
